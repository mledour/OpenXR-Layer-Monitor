name: Bug report
description: The monitor sandwich produces wrong / missing / corrupted measurements.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report. The more of this form you
        fill in, the faster the root cause can be found.

        If you're not sure about a field, leave a short note ("I don't
        know") rather than leaving it blank.

  - type: input
    id: layer-version
    attributes:
      label: Layer version
      description: |
        Shown in the filename of the installer or ZIP you downloaded
        (e.g. `XR_APILAYER_MLEDOUR_layer_monitor-0.0.6-x64-Setup.exe`),
        or in Windows Explorer -> right-click either DLL -> Properties
        -> Details -> Product version.
      placeholder: "0.0.6"
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Install method
      options:
        - Installer (Setup.exe)
        - Manual ZIP + Install-Layer.ps1
        - Built from source
        - Not sure
    validations:
      required: true

  - type: input
    id: target-layer
    attributes:
      label: Target layer being measured
      description: |
        The layer name as registered in
        `HKLM\Software\Khronos\OpenXR\1\ApiLayers\Implicit`. E.g.
        `XR_APILAYER_MBUCCHIA_toolkit`, `XR_APILAYER_MLEDOUR_fov_crop`.
      placeholder: "XR_APILAYER_MBUCCHIA_toolkit"
    validations:
      required: true

  - type: input
    id: hmd
    attributes:
      label: Headset (HMD)
      description: Model and any relevant accessories.
      placeholder: "Quest 3 via Link cable"
    validations:
      required: false

  - type: dropdown
    id: runtime
    attributes:
      label: Active OpenXR runtime
      options:
        - SteamVR
        - Meta / Oculus (Link or native)
        - Windows Mixed Reality (WMR)
        - Virtual Desktop
        - Varjo Base
        - Pimax
        - Other
        - Not sure
    validations:
      required: true

  - type: input
    id: game
    attributes:
      label: Game (or OpenXR application)
      placeholder: "Le Mans Ultimate (Steam build 0.11.0.5)"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: |
        After running the game for ~30 s and running scripts\analyze.py
        on the two CSV files, I expected target_us median to be in the
        single-digit microseconds (the target layer just rewrites FOV).
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What actually happened?
      placeholder: |
        Only frames-<pid>-post.csv was produced (no pre file), so
        analyze.py reports zero matched frames.
    validations:
      required: true

  - type: textarea
    id: layer-ordering
    attributes:
      label: Implicit-layer order in HKLM
      description: |
        Output of:
        ```powershell
        reg query "HKLM\Software\Khronos\OpenXR\1\ApiLayers\Implicit"
        ```
        For the sandwich to capture the target correctly, the order must
        be pre -> target -> post.
      render: text
    validations:
      required: true

  - type: textarea
    id: pre-log
    attributes:
      label: Pre-side log
      description: |
        Content of
        `%LOCALAPPDATA%\XR_APILAYER_MLEDOUR_layer_monitor\XR_APILAYER_MLEDOUR_layer_monitor_pre.log`
        (first ~30 lines suffice if the issue is at init; otherwise the
        section covering the symptom).
      render: shell
    validations:
      required: false

  - type: textarea
    id: post-log
    attributes:
      label: Post-side log
      description: |
        Content of
        `%LOCALAPPDATA%\XR_APILAYER_MLEDOUR_layer_monitor\XR_APILAYER_MLEDOUR_layer_monitor_post.log`.
      render: shell
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: |
        Screenshots, video clips, other OpenXR layers you have installed
        (visible in OpenXR Explorer), specific GPU / CPU if relevant,
        whether the problem is intermittent, etc.
    validations:
      required: false
