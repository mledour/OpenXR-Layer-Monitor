name: Build and Release

# Build on every push to main (verification) + every tag v*.*.* (release).
# workflow_dispatch lets you trigger a build manually from the Actions tab.
on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]
  workflow_dispatch:

# The release job needs `contents: write` to create GitHub releases
# and attach assets to them.
permissions:
  contents: write

env:
  # The monitor ships as a pre/post pair built from one source tree, two .sln.
  # See README "How it works" for why two DLLs are required (the framework's
  # singleton g_instance cannot be safely loaded twice into the same chain).
  LAYER_BASE: XR_APILAYER_MLEDOUR_layer_monitor
  SLN_PRE:    XR_APILAYER_MLEDOUR_layer_monitor_pre.sln
  SLN_POST:   XR_APILAYER_MLEDOUR_layer_monitor_post.sln
  # Hoisted to workflow level so the cache key (Restore step) and the
  # download step (Install step) reference the same version. Bumping
  # this triggers a fresh download because the cache key changes —
  # exactly the behavior we want for Certum MSI updates.
  SIMPLYSIGN_VERSION: '9.4.3.90'

jobs:
  # ---------------------------------------------------------------------------
  # Build: Debug + Release in parallel via matrix. Always runs.
  # Each matrix entry builds BOTH .sln files into the same OutDir, so a single
  # job produces both pre.dll and post.dll side-by-side -- a prerequisite for
  # the installer step (which bundles both into one Setup.exe).
  # ---------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.configuration }} x64
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        configuration: [Release, Debug]

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          # fetch-depth: 0 lets softprops/action-gh-release auto-generate
          # release notes from the full commit history.
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # Decide once, up front, whether this run will code-sign anything.
      # We sign ONLY when ALL of these are true:
      #   1. We're on a tag push (refs/tags/v*) -- i.e. an actual release.
      #   2. The matrix entry is Release (Debug is never signed).
      #   3. The CERTUM_USERNAME secret is set.
      - name: Determine signing eligibility
        id: signing
        shell: pwsh
        env:
          CERTUM_USERNAME: ${{ secrets.CERTUM_USERNAME }}
        run: |
          $isTagBuild     = $env:GITHUB_REF -like 'refs/tags/v*'
          $isReleaseEntry = ('${{ matrix.configuration }}' -eq 'Release')
          $hasSecret      = -not [string]::IsNullOrEmpty($env:CERTUM_USERNAME)
          $eligible       = $isTagBuild -and $isReleaseEntry -and $hasSecret
          Write-Host "isTagBuild     = $isTagBuild  (ref=$env:GITHUB_REF)"
          Write-Host "isReleaseEntry = $isReleaseEntry"
          Write-Host "hasSecret      = $hasSecret"
          Write-Host "should_sign    = $eligible"
          "should_sign=$($eligible.ToString().ToLower())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      # Both .sln share the same vcxproj + same packages.config, so a single
      # restore on either resolves the dependencies for both builds. We pass
      # pre.sln; post.sln would work equally well.
      - name: Restore NuGet packages
        run: nuget restore "${{ env.SLN_PRE }}"

      # Expose the release version to MSBuild's pre-build script
      # (scripts\Generate-VersionRc.ps1) so the VERSIONINFO resource baked
      # into each DLL -- and the installer filename, and the runtime log
      # banner -- match the git tag that triggered this build.
      #
      # Resolution order:
      #   1. refs/tags/v<semver>         -> clean "<semver>"
      #   2. any build after an existing tag  -> git-describe progression
      #   3. no tags yet (fresh fork)   -> fall back to "0.0.0-dev-<sha>"
      - name: Compute layer version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -match '^refs/tags/v(\d+\.\d+\.\d+.*)$') {
            $version = $matches[1]
          } else {
            $desc = git describe --tags --always 2>$null
            if ($LASTEXITCODE -eq 0 -and $desc -match '^v\d+\.\d+\.\d+') {
              $version = $desc -replace '^v', ''
            } else {
              $shortSha = $env:GITHUB_SHA.Substring(0, 7)
              $version = "0.0.0-dev-$shortSha"
            }
          }
          Write-Host "LAYER_VERSION=$version"
          "LAYER_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      # Build pre then post sequentially. Both .sln target the same OutDir
      # (bin\<Platform>\<Configuration>) and produce DLLs named after their
      # respective $(SolutionName), so the second build does NOT overwrite
      # the first. The shared IntDir does cause a full recompile on the
      # second build because LAYER_NAME (a preprocessor define driven by
      # $(SolutionName)) differs -- this is intended and not worth working
      # around for a single-job pipeline.
      - name: Build pre (${{ matrix.configuration }} | x64)
        run: >-
          msbuild "${{ env.SLN_PRE }}"
          /p:Configuration=${{ matrix.configuration }}
          /p:Platform=x64
          /m
          /verbosity:minimal
          /nologo

      - name: Build post (${{ matrix.configuration }} | x64)
        run: >-
          msbuild "${{ env.SLN_POST }}"
          /p:Configuration=${{ matrix.configuration }}
          /p:Platform=x64
          /m
          /verbosity:minimal
          /nologo

      # ---- Code signing (tag pushes only, Release matrix only) -------
      - name: Restore cached SimplySign Desktop MSI
        if: steps.signing.outputs.should_sign == 'true'
        id: cache-simplysign-msi
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/SimplySignDesktop.msi
          key: simplysign-msi-${{ env.SIMPLYSIGN_VERSION }}

      - name: Install SimplySign Desktop
        if: steps.signing.outputs.should_sign == 'true'
        shell: pwsh
        run: |
          $msi = "$env:RUNNER_TEMP\SimplySignDesktop.msi"
          if ((Test-Path $msi) -and (Get-Item $msi).Length -ge 1MB) {
            Write-Host ("Using cached MSI: {0} ({1:N0} bytes)" -f $msi, (Get-Item $msi).Length)
          } else {
            $url = "https://files.certum.eu/software/SimplySignDesktop/Windows/$env:SIMPLYSIGN_VERSION/SimplySignDesktop-$env:SIMPLYSIGN_VERSION-64-bit-en.msi"
            Write-Host "Downloading $url"
            Invoke-WebRequest -Uri $url -OutFile $msi -UseBasicParsing
            if (-not (Test-Path $msi) -or (Get-Item $msi).Length -lt 1MB) {
              throw "MSI download looks invalid: $msi"
            }
          }
          Write-Host "Installing silently ..."
          $p = Start-Process -FilePath msiexec.exe `
                             -ArgumentList @('/i', $msi, '/qn', '/norestart') `
                             -Wait -PassThru
          if ($p.ExitCode -ne 0) {
            throw "msiexec exited $($p.ExitCode)"
          }
          $exe = 'C:\Program Files\Certum\SimplySign Desktop\SimplySignDesktop.exe'
          if (-not (Test-Path $exe)) {
            $found = Get-ChildItem 'C:\Program Files*\' -Recurse -Filter 'SimplySignDesktop.exe' -ErrorAction SilentlyContinue
            throw "SimplySignDesktop.exe not at expected path. Found instead: $($found.FullName -join '; ')"
          }
          Write-Host "Installed: $exe"

      # Sign BOTH DLLs before the installer build, so the signatures end up
      # embedded inside the bundled installer payload and the manual-install
      # ZIP. Anti-cheat scans the DLL on disk, so both halves must be signed
      # or both must be unsigned -- never mix.
      - name: Sign DLLs (Certum SimplySign)
        if: steps.signing.outputs.should_sign == 'true'
        shell: pwsh
        env:
          CERTUM_USERNAME:        ${{ secrets.CERTUM_USERNAME }}
          CERTUM_TOTP_SEED:       ${{ secrets.CERTUM_TOTP_SEED }}
          CERTUM_CERT_THUMBPRINT: ${{ secrets.CERTUM_CERT_THUMBPRINT }}
        run: |
          .\scripts\Sign-Artifact.ps1 -Path "bin\x64\Release\${{ env.LAYER_BASE }}_pre.dll"
          .\scripts\Sign-Artifact.ps1 -Path "bin\x64\Release\${{ env.LAYER_BASE }}_post.dll"

      # Run the test binary. Both .sln rebuild the same openxr-api-layer-tests
      # vcxproj into the same OutDir, so running the .exe once after both
      # layer builds covers the latest source. The tests do not depend on
      # which side they were "linked" with -- the test vcxproj's hardcoded
      # LAYER_NAME just controls layer.cpp's side detection inside the test
      # binary, which is irrelevant to current unit tests.
      - name: Run unit + integration tests (C++, ${{ matrix.configuration }} | x64)
        shell: pwsh
        run: |
          $exe = "bin\x64\${{ matrix.configuration }}\openxr-api-layer-tests.exe"
          if (-not (Test-Path $exe)) {
            throw "Test binary not found at $exe"
          }
          & $exe --reporters=console --force-colors
          if ($LASTEXITCODE -ne 0) {
            throw "openxr-api-layer-tests.exe returned $LASTEXITCODE"
          }

      # Python analyzer tests. Only run once per matrix entry (the script
      # itself is configuration-agnostic, but running in both Release and
      # Debug matrix shards is cheap and catches any pytest-vs-Python-
      # version surprise that might land on the Debug runner). Skip on
      # Win32: the analyzer is platform-agnostic but the matrix only
      # builds x64 anyway.
      - name: Run analyzer tests (Python)
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pytest scripts/test_analyze.py -v
          if ($LASTEXITCODE -ne 0) {
            throw "pytest scripts/test_analyze.py returned $LASTEXITCODE"
          }

      # ---- Inno Setup installer (Release only) --------------------------
      # Produces a single Setup.exe that installs BOTH DLLs + BOTH JSON
      # manifests to Program Files and registers both with the OpenXR
      # loader. See installer/installer.iss for the file/registry layout.
      - name: Install Inno Setup
        if: matrix.configuration == 'Release'
        run: choco install innosetup -y --no-progress

      - name: Build installer
        if: matrix.configuration == 'Release'
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            throw "ISCC.exe not found at $iscc"
          }
          & $iscc /DMyAppVersion=$env:LAYER_VERSION "installer\installer.iss"
          if ($LASTEXITCODE -ne 0) {
            throw "ISCC.exe returned $LASTEXITCODE"
          }
          $exe = Get-ChildItem "bin\installer\*.exe" | Select-Object -First 1
          Write-Host "Installer built: $($exe.Name) ($($exe.Length) bytes)"

      - name: Sign installer (Certum SimplySign)
        if: steps.signing.outputs.should_sign == 'true'
        shell: pwsh
        env:
          CERTUM_USERNAME:        ${{ secrets.CERTUM_USERNAME }}
          CERTUM_TOTP_SEED:       ${{ secrets.CERTUM_TOTP_SEED }}
          CERTUM_CERT_THUMBPRINT: ${{ secrets.CERTUM_CERT_THUMBPRINT }}
        run: |
          .\scripts\Sign-Artifact.ps1 -Path "bin\installer\*.exe"

      - name: Upload installer artifact
        if: matrix.configuration == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.LAYER_BASE }}-Setup-x64
          path: bin/installer/*.exe
          if-no-files-found: error
          retention-days: 30

      # Stage the files a user actually needs to install the layer pair:
      # both DLLs, both PDBs, both processed JSON manifests, and the install
      # scripts (which glob for *_layer_monitor_*.json so they pick up both).
      - name: Stage artifacts
        shell: pwsh
        run: |
          $configuration = "${{ matrix.configuration }}"
          $base          = "${{ env.LAYER_BASE }}"
          $outDir        = "bin\x64\$configuration"
          $stageDir      = "stage\$base-$configuration-x64"

          if (-not (Test-Path $outDir)) {
            throw "Build output not found at $outDir"
          }

          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null

          foreach ($side in @('pre', 'post')) {
            Copy-Item "$outDir\${base}_$side.dll"  $stageDir -ErrorAction Stop
            Copy-Item "$outDir\${base}_$side.pdb"  $stageDir -ErrorAction SilentlyContinue
            Copy-Item "$outDir\${base}_$side.json" $stageDir -ErrorAction Stop
          }
          Copy-Item "$outDir\Install-Layer.ps1"   $stageDir -ErrorAction Stop
          Copy-Item "$outDir\Uninstall-Layer.ps1" $stageDir -ErrorAction Stop

          $readme = @(
            "$base - $configuration x64 (pre + post pair)"
            "================================================================"
            ""
            "This package contains BOTH halves of the sandwich profiler."
            "Both must be installed; one without the other is a no-op."
            ""
            "Install (HKLM, requires elevated PowerShell):"
            "  powershell -ExecutionPolicy Bypass -File .\Install-Layer.ps1"
            ""
            "Uninstall:"
            "  powershell -ExecutionPolicy Bypass -File .\Uninstall-Layer.ps1"
            ""
            "After install, position the target layer between pre and post in"
            "HKLM\Software\Khronos\OpenXR\1\ApiLayers\Implicit -- see README."
            ""
            "To disable without uninstalling, set"
            "  DISABLE_${base}_pre=1"
            "  DISABLE_${base}_post=1"
            "for the host process."
          ) -join "`r`n"
          Set-Content -Path "$stageDir\README.txt" -Value $readme -Encoding UTF8

          "Staged:" | Out-Host
          Get-ChildItem $stageDir | Format-Table Name, Length -AutoSize | Out-Host

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.LAYER_BASE }}-${{ matrix.configuration }}-x64
          path: stage/${{ env.LAYER_BASE }}-${{ matrix.configuration }}-x64/
          if-no-files-found: error
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Release: only runs on a v*.*.* tag push.
  # ---------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package release assets
        run: |
          set -euo pipefail
          mkdir -p release
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            if [[ "$name" == *-Setup-* ]]; then
              cp "$name"/*.exe ../release/
            else
              ( cd "$name" && zip -r "../../release/${name}.zip" . )
            fi
          done
          ls -la ../release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          name: ${{ github.ref_name }}
          body: |
            ## ${{ env.LAYER_BASE }} ${{ github.ref_name }}

            Sandwich CPU profiler for OpenXR API layers. Built from commit
            `${{ github.sha }}`. Ships as a **pre/post pair** -- one DLL
            placed before the target layer in the loader chain, one after.
            Both halves must be installed.

            ### Assets
            | File | Description |
            |------|-------------|
            | `${{ env.LAYER_BASE }}-*-x64-Setup.exe` | **Installer (recommended)** -- installs both halves to Program Files, registers them in HKLM, creates Add/Remove Programs uninstaller |
            | `${{ env.LAYER_BASE }}-Release-x64.zip` | Manual install ZIP -- contains both DLLs + JSONs + PowerShell scripts |
            | `${{ env.LAYER_BASE }}-Debug-x64.zip` | Debug build with full symbols for both halves |

            ### Install (installer)
            1. Download the `...-Setup.exe`.
            2. Run it -- admin elevation is handled automatically.
            3. Both DLLs install to `C:\Program Files\OpenXR-Layer-Monitor\`
               and register with the OpenXR loader.

            ### Install (manual / ZIP)
            1. Download `...-Release-x64.zip` and unzip to a **permanent** location.
            2. Open an **elevated** PowerShell and run:
               ```powershell
               powershell -ExecutionPolicy Bypass -File .\Install-Layer.ps1
               ```
               This registers BOTH manifests in HKLM in one go.

            ### Positioning the target layer
            The OpenXR loader walks `HKLM\Software\Khronos\OpenXR\1\ApiLayers\Implicit`
            in insertion order. For the sandwich to measure correctly, the
            target layer must sit between `_pre` and `_post`. See the README
            for the manual ordering step.

            ### Uninstall
            - **Installer**: Settings -> Apps -> ${{ env.LAYER_BASE }} -> Uninstall
            - **Manual**: run `Uninstall-Layer.ps1` from an elevated PowerShell

            ### Disable without uninstalling
            Set BOTH:
            ```
            DISABLE_${{ env.LAYER_BASE }}_pre=1
            DISABLE_${{ env.LAYER_BASE }}_post=1
            ```

            > Signed with a **Certum Open Source Code Signing Cloud** certificate
            > (subject: *Open Source Developer Michael Ledour*). Verify with:
            > ```powershell
            > signtool verify /pa /v <file>.exe
            > ```
            > Anti-cheat systems may flag any OpenXR layer DLL -- even a signed
            > one -- when loaded into a hooked game.
